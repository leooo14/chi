<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Para Sandra</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:monospace;
}

canvas{
position:fixed;
top:0;
left:0;
}

.mensaje{
position:absolute;
text-align:center;
opacity:0;
animation: aparecer 4s forwards;
animation-delay:9s;
width:90%;
}

h1{
font-size:15vw;
line-height:1;
font-weight:bold;
background:linear-gradient(45deg,#ff0080,#ff66ff,#ff2bd6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 20px #ff00aa,
0 0 50px #ff00aa;
animation:latido 2s infinite;
}

p{
margin-top:25px;
font-size:5vw;
color:#ff8ad8;
text-shadow:0 0 12px hotpink;
line-height:1.7;
}

.small{
margin-top:18px;
font-size:4vw;
opacity:.85;
}

@keyframes aparecer{
to{
opacity:1;
}
}

@keyframes latido{
50%{
transform:scale(1.04);
}
}

.words{
position:absolute;
color:#ff4fcf;
font-size:18px;
animation:float 9s linear infinite;
opacity:.7;
}

@keyframes float{
from{
transform:translateY(120vh);
opacity:0;
}
30%{opacity:1;}
to{
transform:translateY(-30vh);
opacity:0;
}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="mensaje">
<h1>TE AMO</h1>

<p>
Buenos días mi Sandra,<br>
dile a pinki que la amo muchisimo y a ti tambien mi sandrita preciosa y a kira y a cleart 
</p>

<p class="small">
Y si no respondo ya shabe ando seco adsjakddk :3 te mando muchos mumumumu
</p>

</div>


<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let t=0;

function heart(x){
return 16*Math.pow(Math.sin(x),3);
}

function heartY(x){
return 13*Math.cos(x)-5*Math.cos(2*x)-2*Math.cos(3*x)-Math.cos(4*x);
}

let particles=[];

for(let i=0;i<1200;i++){
let a=Math.random()*Math.PI*2;

particles.push({
angle:a,
size:Math.random()*3+1
});
}

function draw(){

ctx.fillStyle="rgba(0,0,0,.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let scale=Math.min(canvas.width,canvas.height)/35;

for(let p of particles){

let x=heart(p.angle)*scale+canvas.width/2;
let y=-heartY(p.angle)*scale+canvas.height/2-70;

ctx.beginPath();
ctx.fillStyle=`hsl(${310+Math.sin(t/20)*40},100%,60%)`;
ctx.shadowBlur=20;
ctx.shadowColor="#ff00cc";
ctx.arc(
x+Math.sin(t/20+p.angle)*4,
y,
p.size,
0,
Math.PI*2
);
ctx.fill();
}

t++;

requestAnimationFrame(draw);
}

draw();



function palabras(){

let frases=[
"mi amol",
"te taño",
"preciosa",
"mi bebe",
"te amo",
"bonita",
"mi sandra",
"mumumuum"
];

let w=document.createElement("div");
w.className="words";
w.innerHTML=frases[Math.floor(Math.random()*frases.length)];

w.style.left=Math.random()*90+"vw";
w.style.fontSize=(16+Math.random()*18)+"px";

document.body.appendChild(w);

setTimeout(()=>{
w.remove();
},9000);

}

setInterval(palabras,500);



setTimeout(()=>{

document.querySelector(".mensaje").style.opacity=1;

},9000);

</script>

</body>
</html>
